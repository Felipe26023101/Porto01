{% load static %}
<link rel="stylesheet" href="{% static 'Usuario/css/estilo.css' %}">
<script src="{% static 'Usuario/js/script.js' %}"></script>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Navega Pará</title>
    <!-- O "?v=1" força o navegador a limpar o cache e carregar o CSS novo -->
    <link rel="stylesheet" href="{% static 'Usuario/css/estilo.css' %}?v=1">
</head>
<body>

    <div class="caixa">
        <h1>Login</h1>

        <form method="post">
            {% csrf_token %}

            <div class="grupo-campo">
                <label for="username">Usuário</label>
                <input type="text" name="username" id="username" placeholder="Digite seu usuário" required>
            </div>

            <div class="grupo-campo">
                <label for="password">Senha</label>
                <input type="password" name="password" id="password" placeholder="Digite sua senha" required>
            </div>

            <button type="submit" class="btn-azul">Entrar</button>
        </form>
    </div>

</body>
</html>
