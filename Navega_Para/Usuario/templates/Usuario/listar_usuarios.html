{% load static %}
<link rel="stylesheet" href="{% static 'Usuario/css/estilo.css' %}">
<script src="{% static 'Usuario/js/script.js' %}"></script>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>
</head>
<body>
    <h1>Usuários cadastrados</h1>
    <table border="1">
        <tr>
            <th>Nome</th>
            <th>Email</th>
        </tr>
        {% for usuario in usuarios %}
        <tr>
            <td>{{ usuario.nome }}</td>
            <td>{{ usuario.email }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="2">Nenhum usuário encontrado.</td>
        </tr>
        {% endfor %}
    </table>
    <a href="{% url 'cadastrar_usuario' %}">Cadastrar novo usuário</a>
</body>
</html>
