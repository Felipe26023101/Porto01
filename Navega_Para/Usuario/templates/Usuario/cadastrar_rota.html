<link rel="stylesheet" href="{% static 'Usuario/css/estilo.css' %}">
<script src="{% static 'Usuario/js/script.js' %}"></script>


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Rota - Navega Pará</title>
    <link rel="stylesheet" href="{% static 'Usuario/css/estilo.css' %}?v=8">
    <script src="{% static 'Usuario/js/script.js' %}" defer></script>
</head>
<body>

<div class="caixa">
    <h1>{% if editando %}Editar Rota{% else %}Cadastrar Rota{% endif %}</h1>


    <form method="post">
        {% csrf_token %}

        <!-- Mostra se o Django recusou o formulário por erro de preenchimento -->
        {% if form.errors %}
        <div style="color: #dc3545; background-color: #f8d7da; padding: 10px; border-radius: 6px; margin-bottom: 15px; font-size: 13px; text-align: left;">
            Por favor, corrija os erros abaixo.
        </div>
        {% endif %}

        {{ form.as_p }}

        <button type="submit" class="btn-azul">Salvar Rota</button>
    </form>

    <a href="{% url 'listar_rotas' %}" class="link-padrao">Voltar para Rotas</a>
</div>

</body>
</html>
